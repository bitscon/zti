name: Deploy Site

on:
  push:
    branches:
      - master
    paths:
      - dev/site/_src/**
      - dev/site/build.py
      - zti/demo/**
      - resources/demo/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install website build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Regenerate canonical demo artifacts
        run: python -m zti.demo.cli reset --profile recording

      - name: Build production website artifact
        run: python dev/site/build.py --target prod --out dev/site/_dist_prod

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dev/site/_dist_prod

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v5
